name: Rust

on:
  push:
    branches: [master, rust-port]
    paths:
      - "rust/**"
      - "tools/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "rust/**"
      - "tools/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Format, lint, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace
        env:
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib

  python-smoke:
    name: Maturin develop + import smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install Python
        run: uv python install 3.14
      - name: Install project
        run: uv sync
      - name: Check generated ops.rs is in sync
        run: uv run python tools/gen_ops.py --check
      - name: Build and install extension
        run: uv run maturin develop -m rust/sonolus-backend-py/Cargo.toml
      - name: Import smoke test
        run: uv run python -c "import sonolus_backend; print(sonolus_backend.backend_version())"
      - name: Backend tests (with extension)
        run: uv run pytest tests/backend -q
