name: Publish to PyPI

on: push

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install Python
        run: |
          uv python install 3.12 3.13 3.14
      - name: Install project
        # Compiles the Cython extension implicitly via PEP 517.
        run: |
          uv sync --all-extras --dev
      - name: Run tests
        run: |
          CI=true uv run tox

  wheels:
    name: Wheels (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # linux x86_64 (manylinux + musllinux)
          - ubuntu-24.04-arm   # linux aarch64 (native runner)
          - windows-latest     # windows AMD64
          - windows-11-arm     # windows ARM64 (native runner)
          - macos-latest       # macOS arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build wheels
        uses: pypa/cibuildwheel@v3
      - name: Store wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  sdist:
    name: Sdist
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build sdist
        run: |
          uv build --sdist
      - name: Store sdist
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - wheels
      - sdist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sonolus.py
    permissions:
      id-token: write
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist/
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
